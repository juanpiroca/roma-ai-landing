<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg8" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#0d1540"/>
      <stop offset="100%" stop-color="#050816"/>
    </radialGradient>
    <linearGradient id="tg8" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f6ef7"/>
      <stop offset="100%" stop-color="#00e5bf"/>
    </linearGradient>
    <radialGradient id="eyeGlowL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5bf" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#050816" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeGlowR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5bf" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#050816" stop-opacity="0"/>
    </radialGradient>
    <filter id="g8">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g8s">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g8x">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bg8)"/>

  <!-- Outer hex rings - concentric -->
  <polygon points="200,52 265,90 265,165 200,203 135,165 135,90"
    fill="none" stroke="#4f6ef7" stroke-width="0.5" opacity="0.2" stroke-dasharray="5,10"/>
  <polygon points="200,62 255,95 255,160 200,193 145,160 145,95"
    fill="none" stroke="#4f6ef7" stroke-width="0.5" opacity="0.3" stroke-dasharray="3,7"/>
  <polygon points="200,72 245,100 245,155 200,183 155,155 155,100"
    fill="none" stroke="url(#tg8)" stroke-width="1" opacity="0.5"/>

  <!-- Minimal wolf head — dark polygon -->
  <path d="M200,78 Q176,82 163,98 Q150,114 150,135 Q150,162 168,178 Q182,192 200,194 Q218,192 232,178 Q250,162 250,135 Q250,114 237,98 Q224,82 200,78Z"
    fill="#080e25" stroke="url(#tg8)" stroke-width="1.2" opacity="0.8"/>

  <!-- Ear tips only — minimal -->
  <polygon points="168,98 155,72 182,92" fill="#080e25" stroke="url(#tg8)" stroke-width="1.2"/>
  <polygon points="232,98 245,72 218,92" fill="#080e25" stroke="url(#tg8)" stroke-width="1.2"/>

  <!-- EYE GLOW HALOS -->
  <ellipse cx="178" cy="132" rx="25" ry="20" fill="url(#eyeGlowL)"/>
  <ellipse cx="222" cy="132" rx="25" ry="20" fill="url(#eyeGlowR)"/>

  <!-- Eyes — THE CENTERPIECE -->
  <g filter="url(#g8)">
    <!-- Left eye outer -->
    <ellipse cx="178" cy="132" rx="14" ry="10" fill="#050816" stroke="#00e5bf" stroke-width="2"/>
    <!-- Left pupil — vertical slit -->
    <ellipse cx="178" cy="132" rx="5" ry="8" fill="#00e5bf" opacity="0.85"/>
    <!-- Left iris ring -->
    <ellipse cx="178" cy="132" rx="9" ry="7" fill="none" stroke="#00e5bf" stroke-width="0.8" opacity="0.5"/>
    <!-- Left eye shine -->
    <circle cx="181" cy="129" r="2" fill="white" opacity="0.9"/>

    <!-- Right eye outer -->
    <ellipse cx="222" cy="132" rx="14" ry="10" fill="#050816" stroke="#00e5bf" stroke-width="2"/>
    <!-- Right pupil -->
    <ellipse cx="222" cy="132" rx="5" ry="8" fill="#00e5bf" opacity="0.85"/>
    <!-- Right iris ring -->
    <ellipse cx="222" cy="132" rx="9" ry="7" fill="none" stroke="#00e5bf" stroke-width="0.8" opacity="0.5"/>
    <!-- Right eye shine -->
    <circle cx="225" cy="129" r="2" fill="white" opacity="0.9"/>
  </g>

  <!-- Minimal nose bridge line -->
  <line x1="200" y1="142" x2="200" y2="162" stroke="#4f6ef7" stroke-width="0.8" opacity="0.4"/>

  <!-- Nose dot -->
  <circle cx="200" cy="164" r="4" fill="#4f6ef7" opacity="0.5" filter="url(#g8s)"/>

  <!-- Hex node dots -->
  <g fill="#00e5bf" filter="url(#g8)">
    <circle cx="200" cy="72" r="3" opacity="0.8"/>
    <circle cx="245" cy="100" r="3" opacity="0.8"/>
    <circle cx="245" cy="155" r="3" opacity="0.8"/>
    <circle cx="200" cy="183" r="3" opacity="0.8"/>
    <circle cx="155" cy="155" r="3" opacity="0.8"/>
    <circle cx="155" cy="100" r="3" opacity="0.8"/>
  </g>

  <!-- Separator — minimal dot line -->
  <g fill="#4f6ef7" opacity="0.35">
    <circle cx="105" cy="218" r="1.5"/>
    <circle cx="125" cy="218" r="1.5"/>
    <circle cx="145" cy="218" r="1.5"/>
    <circle cx="165" cy="218" r="1.5"/>
    <circle cx="185" cy="218" r="1.5"/>
    <circle cx="200" cy="218" r="2.5" opacity="0.6"/>
    <circle cx="215" cy="218" r="1.5"/>
    <circle cx="235" cy="218" r="1.5"/>
    <circle cx="255" cy="218" r="1.5"/>
    <circle cx="275" cy="218" r="1.5"/>
    <circle cx="295" cy="218" r="1.5"/>
  </g>

  <!-- ROMA — wide spaced gradient -->
  <text x="200" y="262" font-family="'Arial Black', 'Arial', sans-serif" font-size="42"
    font-weight="900" fill="url(#tg8)" text-anchor="middle" letter-spacing="8">ROMA</text>

  <!-- Thin rule -->
  <line x1="120" y1="274" x2="280" y2="274" stroke="url(#tg8)" stroke-width="0.4" opacity="0.3"/>

  <!-- AI — spaced out, teal -->
  <text x="200" y="298" font-family="'Arial', sans-serif" font-size="14"
    font-weight="200" fill="#00e5bf" text-anchor="middle" letter-spacing="18" filter="url(#g8s)">AI</text>

  <!-- Tagline -->
  <text x="200" y="326" font-family="'Arial', sans-serif" font-size="8"
    fill="#4f6ef7" text-anchor="middle" letter-spacing="4" opacity="0.6">INTELLIGENT AUTOMATION</text>
</svg>
