<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f6ef7"/>
      <stop offset="100%" stop-color="#00e5bf"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4f6ef7"/>
      <stop offset="55%" stop-color="#00e5bf"/>
      <stop offset="100%" stop-color="white"/>
    </linearGradient>
    <radialGradient id="flameGlow" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#00e5bf" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#050816" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glows">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="#050816"/>

  <!-- ETERNAL FLAME — Vesta's flame, but digital -->

  <!-- Background glow under flame -->
  <ellipse cx="200" cy="185" rx="60" ry="40" fill="url(#flameGlow)"/>

  <!-- Outer flame shape — the spirit of the AI -->
  <path d="M200,72
    C215,95 238,108 232,135
    C228,152 240,162 235,178
    C229,196 218,200 200,200
    C182,200 171,196 165,178
    C160,162 172,152 168,135
    C162,108 185,95 200,72Z"
    fill="url(#flameGrad)" opacity="0.85" filter="url(#glows)"/>

  <!-- Inner flame — brighter core -->
  <path d="M200,95
    C210,112 222,122 218,142
    C215,155 222,162 218,173
    C214,184 208,188 200,188
    C192,188 186,184 182,173
    C178,162 185,155 182,142
    C178,122 190,112 200,95Z"
    fill="white" opacity="0.15"/>

  <!-- Circuit lines INSIDE the flame — data flowing up -->
  <g stroke="#050816" stroke-width="1" opacity="0.4" fill="none">
    <line x1="200" y1="190" x2="200" y2="160"/>
    <line x1="200" y1="175" x2="190" y2="162"/>
    <line x1="200" y1="175" x2="210" y2="162"/>
    <line x1="200" y1="160" x2="193" y2="148"/>
    <line x1="200" y1="160" x2="207" y2="148"/>
  </g>

  <!-- Flame tip — single point glow -->
  <circle cx="200" cy="74" r="5" fill="white" opacity="0.9" filter="url(#glow)"/>

  <!-- Base bowl — minimal vessel holding the flame -->
  <path d="M172,200 Q172,210 200,212 Q228,210 228,200" fill="none" stroke="url(#tg)" stroke-width="2" stroke-linecap="round"/>
  <rect x="185" y="210" width="30" height="6" rx="3" fill="none" stroke="url(#tg)" stroke-width="1.5"/>
  <!-- Pedestal foot -->
  <line x1="175" y1="216" x2="225" y2="216" stroke="url(#tg)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Circuit nodes at flame base -->
  <circle cx="175" cy="216" r="3.5" fill="#4f6ef7" opacity="0.8" filter="url(#glows)"/>
  <circle cx="225" cy="216" r="3.5" fill="#00e5bf" opacity="0.8" filter="url(#glows)"/>

  <!-- ROMA gradient text -->
  <text x="200" y="265" font-family="'Arial Black','Arial',sans-serif" font-size="48"
    font-weight="900" fill="url(#tg)" text-anchor="middle" letter-spacing="4">ROMA</text>

  <line x1="118" y1="277" x2="282" y2="277" stroke="url(#tg)" stroke-width="0.5" opacity="0.35"/>

  <text x="200" y="302" font-family="'Arial',sans-serif" font-size="13"
    font-weight="300" fill="#00e5bf" text-anchor="middle" letter-spacing="16">AI</text>

  <text x="200" y="330" font-family="'Arial',sans-serif" font-size="8"
    fill="#4f6ef7" text-anchor="middle" letter-spacing="4" opacity="0.55">INTELLIGENT AUTOMATION</text>
</svg>
