<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1640"/>
      <stop offset="100%" stop-color="#050816"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="42%" r="45%">
      <stop offset="0%" stop-color="#4f6ef7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4f6ef7" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg1)"/>
  <rect width="400" height="400" fill="url(#glow1)"/>

  <!-- Concept 1: THE ORACLE — Particle face dissolving into data streams -->
  <!-- Central glow orb -->
  <circle cx="200" cy="155" r="70" fill="none" stroke="#4f6ef7" stroke-width="0.5" opacity="0.4"/>
  <circle cx="200" cy="155" r="55" fill="none" stroke="#4f6ef7" stroke-width="0.5" opacity="0.3"/>

  <!-- Stylized face made of particles/nodes -->
  <!-- Face outline - dots -->
  <g fill="#00e5bf" filter="url(#glow)">
    <!-- Head outline particles -->
    <circle cx="200" cy="90" r="2.5" opacity="0.9"/>
    <circle cx="220" cy="93" r="2" opacity="0.8"/>
    <circle cx="237" cy="100" r="2" opacity="0.7"/>
    <circle cx="249" cy="113" r="1.8" opacity="0.7"/>
    <circle cx="255" cy="128" r="1.5" opacity="0.6"/>
    <circle cx="253" cy="145" r="1.5" opacity="0.6"/>
    <circle cx="180" cy="93" r="2" opacity="0.8"/>
    <circle cx="163" cy="100" r="2" opacity="0.7"/>
    <circle cx="151" cy="113" r="1.8" opacity="0.7"/>
    <circle cx="145" cy="128" r="1.5" opacity="0.6"/>
    <circle cx="147" cy="145" r="1.5" opacity="0.6"/>
    <!-- Jaw -->
    <circle cx="155" cy="165" r="1.5" opacity="0.6"/>
    <circle cx="165" cy="180" r="1.8" opacity="0.7"/>
    <circle cx="182" cy="190" r="2" opacity="0.8"/>
    <circle cx="200" cy="192" r="2.5" opacity="0.9"/>
    <circle cx="218" cy="190" r="2" opacity="0.8"/>
    <circle cx="235" cy="180" r="1.8" opacity="0.7"/>
    <circle cx="245" cy="165" r="1.5" opacity="0.6"/>
  </g>

  <!-- Eyes - glowing nodes -->
  <g filter="url(#glow)">
    <circle cx="176" cy="138" r="4" fill="#4f6ef7" opacity="0.9"/>
    <circle cx="176" cy="138" r="2" fill="#ffffff" opacity="0.8"/>
    <circle cx="224" cy="138" r="4" fill="#4f6ef7" opacity="0.9"/>
    <circle cx="224" cy="138" r="2" fill="#ffffff" opacity="0.8"/>
    <!-- Eye glow rings -->
    <circle cx="176" cy="138" r="7" fill="none" stroke="#4f6ef7" stroke-width="0.8" opacity="0.4"/>
    <circle cx="224" cy="138" r="7" fill="none" stroke="#4f6ef7" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Data streams dissolving from face -->
  <g stroke="#00e5bf" stroke-width="0.8" opacity="0.5" fill="none">
    <path d="M155 165 Q130 175 100 170"/>
    <path d="M245 165 Q270 175 300 170"/>
    <path d="M165 180 Q145 200 120 210"/>
    <path d="M235 180 Q255 200 280 210"/>
    <path d="M200 192 Q200 215 200 240"/>
  </g>

  <!-- Circuit dots along streams -->
  <g fill="#00e5bf" opacity="0.6">
    <circle cx="127" cy="170" r="1.5"/>
    <circle cx="273" cy="170" r="1.5"/>
    <circle cx="133" cy="207" r="1.5"/>
    <circle cx="267" cy="207" r="1.5"/>
    <circle cx="200" cy="225" r="1.5"/>
  </g>

  <!-- Laurel wreath - minimal circuit style -->
  <g stroke="#4f6ef7" stroke-width="1" fill="none" opacity="0.7">
    <!-- Left side -->
    <path d="M130 155 Q118 140 125 125 Q132 110 145 115"/>
    <path d="M128 170 Q112 158 115 140 Q118 122 133 125"/>
    <!-- Right side -->
    <path d="M270 155 Q282 140 275 125 Q268 110 255 115"/>
    <path d="M272 170 Q288 158 285 140 Q282 122 267 125"/>
  </g>

  <!-- Separator line -->
  <line x1="80" y1="218" x2="320" y2="218" stroke="#4f6ef7" stroke-width="0.5" opacity="0.4"/>

  <!-- Logo text: ROMA -->
  <text x="200" y="255" font-family="'Arial', sans-serif" font-size="38" font-weight="700" fill="white" text-anchor="middle" letter-spacing="8">ROMA</text>

  <!-- AI text -->
  <text x="200" y="285" font-family="'Arial', sans-serif" font-size="18" font-weight="400" fill="#00e5bf" text-anchor="middle" letter-spacing="12" filter="url(#glow)">AI</text>

  <!-- Tagline -->
  <text x="200" y="315" font-family="'Arial', sans-serif" font-size="9" fill="#4f6ef7" text-anchor="middle" letter-spacing="3" opacity="0.8">INTELLIGENT · AUTOMATION</text>
</svg>
