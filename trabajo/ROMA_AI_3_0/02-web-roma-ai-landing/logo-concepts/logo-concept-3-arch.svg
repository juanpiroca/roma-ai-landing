<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0c1535"/>
      <stop offset="100%" stop-color="#050816"/>
    </radialGradient>
    <linearGradient id="archGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4f6ef7"/>
      <stop offset="100%" stop-color="#00e5bf"/>
    </linearGradient>
    <radialGradient id="portalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f6ef7" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#00e5bf" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#050816" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg3)"/>

  <!-- Concept 3: TRIUMPHAL ARCH — Roman arch as a portal to the digital world -->

  <!-- Portal glow behind arch -->
  <ellipse cx="200" cy="140" rx="75" ry="85" fill="url(#portalGlow)"/>

  <!-- Neural network inside the arch (the "digital world" view through portal) -->
  <g stroke="#4f6ef7" stroke-width="0.6" opacity="0.4" fill="none">
    <line x1="155" y1="80" x2="185" y2="105"/>
    <line x1="185" y1="105" x2="200" y2="95"/>
    <line x1="200" y1="95" x2="215" y2="105"/>
    <line x1="215" y1="105" x2="245" y2="80"/>
    <line x1="185" y1="105" x2="175" y2="130"/>
    <line x1="215" y1="105" x2="225" y2="130"/>
    <line x1="200" y1="95" x2="200" y2="125"/>
    <line x1="175" y1="130" x2="200" y2="125"/>
    <line x1="225" y1="130" x2="200" y2="125"/>
    <line x1="175" y1="130" x2="170" y2="160"/>
    <line x1="225" y1="130" x2="230" y2="160"/>
    <line x1="200" y1="125" x2="200" y2="155"/>
    <line x1="170" y1="160" x2="200" y2="155"/>
    <line x1="230" y1="160" x2="200" y2="155"/>
  </g>

  <!-- Neural network nodes -->
  <g fill="#00e5bf" filter="url(#softGlow)">
    <circle cx="200" cy="95" r="3" opacity="0.9"/>
    <circle cx="185" cy="105" r="2.5" opacity="0.8"/>
    <circle cx="215" cy="105" r="2.5" opacity="0.8"/>
    <circle cx="175" cy="130" r="2.5" opacity="0.7"/>
    <circle cx="225" cy="130" r="2.5" opacity="0.7"/>
    <circle cx="200" cy="125" r="3" opacity="0.9"/>
    <circle cx="170" cy="160" r="2" opacity="0.6"/>
    <circle cx="230" cy="160" r="2" opacity="0.6"/>
    <circle cx="200" cy="155" r="2.5" opacity="0.8"/>
  </g>

  <!-- TRIUMPHAL ARCH structure -->
  <!-- Main arch body -->
  <!-- Left pillar -->
  <rect x="130" y="85" width="28" height="110" fill="#0d1640" stroke="url(#archGrad)" stroke-width="1.5"/>
  <!-- Right pillar -->
  <rect x="242" y="85" width="28" height="110" fill="#0d1640" stroke="url(#archGrad)" stroke-width="1.5"/>
  <!-- Arch top (semicircle) -->
  <path d="M130,85 A70,70 0 0,1 270,85" fill="#0d1640" stroke="url(#archGrad)" stroke-width="1.5"/>
  <!-- Inner arch cutout -->
  <path d="M143,118 A57,57 0 0,1 257,118 L257,195 L143,195 Z" fill="#050816"/>
  <!-- Arch inner border -->
  <path d="M143,118 A57,57 0 0,1 257,118" fill="none" stroke="#00e5bf" stroke-width="1" opacity="0.6" filter="url(#softGlow)"/>

  <!-- Decorative column details -->
  <!-- Left pillar details -->
  <line x1="130" y1="105" x2="158" y2="105" stroke="#4f6ef7" stroke-width="0.6" opacity="0.5"/>
  <line x1="130" y1="115" x2="158" y2="115" stroke="#4f6ef7" stroke-width="0.4" opacity="0.3"/>
  <line x1="130" y1="175" x2="158" y2="175" stroke="#4f6ef7" stroke-width="0.6" opacity="0.5"/>
  <!-- Right pillar details -->
  <line x1="242" y1="105" x2="270" y2="105" stroke="#4f6ef7" stroke-width="0.6" opacity="0.5"/>
  <line x1="242" y1="115" x2="270" y2="115" stroke="#4f6ef7" stroke-width="0.4" opacity="0.3"/>
  <line x1="242" y1="175" x2="270" y2="175" stroke="#4f6ef7" stroke-width="0.6" opacity="0.5"/>

  <!-- Entablature (top horizontal beam) -->
  <rect x="118" y="75" width="164" height="12" fill="#0d1640" stroke="url(#archGrad)" stroke-width="1"/>
  <!-- Top decoration dots -->
  <g fill="#00e5bf" opacity="0.7" filter="url(#softGlow)">
    <circle cx="140" cy="81" r="1.5"/>
    <circle cx="160" cy="81" r="1.5"/>
    <circle cx="200" cy="81" r="2"/>
    <circle cx="240" cy="81" r="1.5"/>
    <circle cx="260" cy="81" r="1.5"/>
  </g>

  <!-- Ground base -->
  <rect x="115" y="195" width="170" height="8" fill="#0d1640" stroke="#4f6ef7" stroke-width="0.8" opacity="0.6"/>

  <!-- Separator -->
  <line x1="80" y1="225" x2="320" y2="225" stroke="#4f6ef7" stroke-width="0.5" opacity="0.3"/>
  <circle cx="200" cy="225" r="3" fill="#4f6ef7" opacity="0.5"/>

  <!-- ROMA text -->
  <text x="200" y="265" font-family="'Arial', sans-serif" font-size="40" font-weight="800" fill="white" text-anchor="middle" letter-spacing="7">ROMA</text>

  <!-- AI text -->
  <text x="200" y="290" font-family="'Arial', sans-serif" font-size="15" font-weight="300" fill="#00e5bf" text-anchor="middle" letter-spacing="14" filter="url(#softGlow)">AI</text>

  <!-- Tagline -->
  <text x="200" y="318" font-family="'Arial', sans-serif" font-size="8.5" fill="#4f6ef7" text-anchor="middle" letter-spacing="3" opacity="0.7">INTELLIGENT · AUTOMATION</text>
</svg>
