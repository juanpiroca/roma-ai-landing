<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f6ef7"/>
      <stop offset="100%" stop-color="#00e5bf"/>
    </linearGradient>
    <!-- Snake gradient goes around the circle -->
    <linearGradient id="snakeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5bf"/>
      <stop offset="50%" stop-color="#4f6ef7"/>
      <stop offset="100%" stop-color="#00e5bf" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glows">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="#050816"/>

  <!-- OUROBOROS — serpent eating its own tail, Roman symbol of infinity/cycle -->
  <!-- Reimagined as a data loop — the AI that continuously learns -->

  <!-- The snake body = thick circle, open at one point where head meets tail -->
  <!-- Main ring — the snake body -->
  <circle cx="200" cy="138" r="68" fill="none" stroke="url(#snakeGrad)" stroke-width="14"
    stroke-dasharray="380 50" stroke-dashoffset="0" stroke-linecap="round"/>

  <!-- Inner ring detail — circuit pattern -->
  <circle cx="200" cy="138" r="68" fill="none" stroke="#050816" stroke-width="6"
    stroke-dasharray="2 8" stroke-linecap="round" opacity="0.8"/>

  <!-- Scale/circuit details on the body -->
  <circle cx="200" cy="138" r="68" fill="none" stroke="#00e5bf" stroke-width="0.8"
    stroke-dasharray="1 12" stroke-linecap="round" opacity="0.5" filter="url(#glows)"/>

  <!-- Snake HEAD — at the top right of the ring -->
  <!-- Head position: roughly at angle 330° from center = (200+68*cos(-30°), 138+68*sin(-30°)) ≈ (259, 104) -->
  <ellipse cx="258" cy="104" rx="12" ry="9" fill="#0d1a50" stroke="#00e5bf" stroke-width="2" transform="rotate(-30,258,104)"/>
  <!-- Eye -->
  <circle cx="262" cy="101" r="3.5" fill="#00e5bf" opacity="0.9" filter="url(#glow)"/>
  <circle cx="263" cy="100" r="1.5" fill="white" opacity="0.9"/>
  <!-- Forked tongue / data input -->
  <path d="M268,97 L276,92 M268,97 L274,102" stroke="#00e5bf" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Snake TAIL — meeting the mouth, at angle ~300° -->
  <!-- Tail position: roughly (234, 79) -->
  <!-- The tail tapers to a point -->
  <path d="M232,76 Q244,72 252,82" fill="none" stroke="url(#snakeGrad)" stroke-width="8" stroke-linecap="round"/>
  <path d="M244,72 Q252,70 258,78" fill="none" stroke="url(#snakeGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- CENTER TEXT inside the ring -->
  <text x="200" y="130" font-family="'Arial Black','Arial',sans-serif" font-size="22"
    font-weight="900" fill="url(#tg)" text-anchor="middle" letter-spacing="2">ROMA</text>
  <text x="200" y="152" font-family="'Arial',sans-serif" font-size="12"
    font-weight="300" fill="#00e5bf" text-anchor="middle" letter-spacing="8">AI</text>

  <!-- Bottom label — larger standalone -->
  <line x1="118" y1="260" x2="282" y2="260" stroke="url(#tg)" stroke-width="0.5" opacity="0.3"/>

  <text x="200" y="295" font-family="'Arial Black','Arial',sans-serif" font-size="48"
    font-weight="900" fill="url(#tg)" text-anchor="middle" letter-spacing="4">ROMA</text>

  <line x1="118" y1="308" x2="282" y2="308" stroke="url(#tg)" stroke-width="0.5" opacity="0.35"/>

  <text x="200" y="333" font-family="'Arial',sans-serif" font-size="13"
    font-weight="300" fill="#00e5bf" text-anchor="middle" letter-spacing="16">AI</text>
</svg>
