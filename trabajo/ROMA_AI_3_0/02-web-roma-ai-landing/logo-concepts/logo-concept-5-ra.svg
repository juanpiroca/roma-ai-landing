<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0c1535"/>
      <stop offset="100%" stop-color="#050816"/>
    </radialGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f6ef7"/>
      <stop offset="100%" stop-color="#00e5bf"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f6ef7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4f6ef7" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg5)"/>

  <!-- Concept 5: R·A MONOGRAM — Letters R and A as a single interlocking symbol -->

  <!-- Outer orbit rings -->
  <circle cx="200" cy="155" r="105" fill="none" stroke="#4f6ef7" stroke-width="0.4" opacity="0.2" stroke-dasharray="4,8"/>
  <circle cx="200" cy="155" r="88" fill="none" stroke="#4f6ef7" stroke-width="0.5" opacity="0.15" stroke-dasharray="3,6"/>

  <!-- Center glow -->
  <circle cx="200" cy="155" r="75" fill="url(#centerGlow)"/>

  <!-- Hex border -->
  <polygon points="200,68 263,105 263,180 200,217 137,180 137,105"
    fill="none" stroke="url(#letterGrad)" stroke-width="1.5" filter="url(#glow5)"/>

  <!-- Inner hex -->
  <polygon points="200,78 253,108 253,172 200,202 147,172 147,108"
    fill="#070d20" stroke="#4f6ef7" stroke-width="0.5" opacity="0.4"/>

  <!-- THE MONOGRAM: R·A fused -->
  <!-- Letter R (left portion) -->
  <g fill="none" stroke="url(#letterGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow5)">
    <!-- R vertical stroke -->
    <line x1="163" y1="108" x2="163" y2="195"/>
    <!-- R top horizontal -->
    <line x1="163" y1="108" x2="195" y2="108"/>
    <!-- R bump (arc) -->
    <path d="M195,108 Q218,108 218,130 Q218,152 195,152"/>
    <!-- R bottom horizontal -->
    <line x1="163" y1="152" x2="195" y2="152"/>
    <!-- R leg (diagonal) -->
    <line x1="195" y1="152" x2="220" y2="195"/>
  </g>

  <!-- Letter A (right portion, shares the R's right leg) -->
  <g fill="none" stroke="url(#letterGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow5)">
    <!-- A left stroke (shared with R leg) -->
    <line x1="220" y1="195" x2="200" y2="108"/>
    <!-- A right stroke -->
    <line x1="200" y1="108" x2="237" y2="195"/>
    <!-- A crossbar -->
    <line x1="212" y1="160" x2="233" y2="160"/>
  </g>

  <!-- Node dots at key intersections -->
  <g fill="#00e5bf" filter="url(#strongGlow)">
    <circle cx="200" cy="108" r="4" opacity="0.9"/>
    <circle cx="163" cy="108" r="3.5" opacity="0.8"/>
    <circle cx="163" cy="152" r="3.5" opacity="0.8"/>
    <circle cx="195" cy="152" r="4" opacity="0.9"/>
    <circle cx="220" cy="195" r="3.5" opacity="0.8"/>
    <circle cx="163" cy="195" r="3.5" opacity="0.8"/>
    <circle cx="237" cy="195" r="3.5" opacity="0.8"/>
    <circle cx="212" cy="160" r="3" opacity="0.7"/>
    <circle cx="233" cy="160" r="3" opacity="0.7"/>
  </g>

  <!-- Small orbit nodes around hex -->
  <g fill="#4f6ef7" opacity="0.6">
    <circle cx="200" cy="68" r="3"/>
    <circle cx="263" cy="105" r="3"/>
    <circle cx="263" cy="180" r="3"/>
    <circle cx="200" cy="217" r="3"/>
    <circle cx="137" cy="180" r="3"/>
    <circle cx="137" cy="105" r="3"/>
  </g>

  <!-- Separator -->
  <line x1="90" y1="240" x2="310" y2="240" stroke="#4f6ef7" stroke-width="0.5" opacity="0.3"/>

  <!-- ROMA wordmark -->
  <text x="200" y="275" font-family="'Arial', sans-serif" font-size="36" font-weight="800" fill="white" text-anchor="middle" letter-spacing="10">ROMA</text>

  <!-- AI -->
  <text x="200" y="300" font-family="'Arial', sans-serif" font-size="14" font-weight="400" fill="#00e5bf" text-anchor="middle" letter-spacing="14" filter="url(#glow5)">AI</text>

  <!-- Side lines -->
  <line x1="80" y1="287" x2="153" y2="287" stroke="#4f6ef7" stroke-width="0.5" opacity="0.35"/>
  <line x1="247" y1="287" x2="320" y2="287" stroke="#4f6ef7" stroke-width="0.5" opacity="0.35"/>

  <!-- Tagline -->
  <text x="200" y="326" font-family="'Arial', sans-serif" font-size="8.5" fill="#4f6ef7" text-anchor="middle" letter-spacing="3" opacity="0.7">INTELLIGENT · AUTOMATION</text>
</svg>
