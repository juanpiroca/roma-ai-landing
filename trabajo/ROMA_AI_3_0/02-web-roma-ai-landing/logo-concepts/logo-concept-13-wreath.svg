<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f6ef7"/>
      <stop offset="100%" stop-color="#00e5bf"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="#050816"/>

  <!-- WREATH RING — clean laurel leaves as triangles, no clutter -->
  <!-- 16 leaves arranged in a circle, alternating blue/teal, clean triangular shapes -->

  <g transform="translate(200,138)">
    <!-- Each leaf: a slim pointed ellipse rotated around the center -->
    <!-- Radius ~62px from center -->

    <!-- 0° -->  <ellipse cx="0" cy="-62" rx="6" ry="16" fill="#4f6ef7" opacity="0.9" transform="rotate(0)"/>
    <!-- 22.5° --> <ellipse cx="0" cy="-62" rx="6" ry="16" fill="#00e5bf" opacity="0.8" transform="rotate(22.5)"/>
    <!-- 45° -->  <ellipse cx="0" cy="-62" rx="6" ry="16" fill="#4f6ef7" opacity="0.9" transform="rotate(45)"/>
    <!-- 67.5° --> <ellipse cx="0" cy="-62" rx="6" ry="16" fill="#00e5bf" opacity="0.8" transform="rotate(67.5)"/>
    <!-- 90° -->  <ellipse cx="0" cy="-62" rx="6" ry="16" fill="#4f6ef7" opacity="0.9" transform="rotate(90)"/>
    <!-- 112.5° --> <ellipse cx="0" cy="-62" rx="6" ry="16" fill="#00e5bf" opacity="0.8" transform="rotate(112.5)"/>
    <!-- 135° --> <ellipse cx="0" cy="-62" rx="6" ry="16" fill="#4f6ef7" opacity="0.9" transform="rotate(135)"/>
    <!-- 157.5° --> <ellipse cx="0" cy="-62" rx="6" ry="16" fill="#00e5bf" opacity="0.8" transform="rotate(157.5)"/>
    <!-- 180° --> <ellipse cx="0" cy="-62" rx="6" ry="16" fill="#4f6ef7" opacity="0.9" transform="rotate(180)"/>
    <!-- 202.5° --> <ellipse cx="0" cy="-62" rx="6" ry="16" fill="#00e5bf" opacity="0.8" transform="rotate(202.5)"/>
    <!-- 225° --> <ellipse cx="0" cy="-62" rx="6" ry="16" fill="#4f6ef7" opacity="0.9" transform="rotate(225)"/>
    <!-- 247.5° --> <ellipse cx="0" cy="-62" rx="6" ry="16" fill="#00e5bf" opacity="0.8" transform="rotate(247.5)"/>
    <!-- 270° --> <ellipse cx="0" cy="-62" rx="6" ry="16" fill="#4f6ef7" opacity="0.9" transform="rotate(270)"/>
    <!-- 292.5° --> <ellipse cx="0" cy="-62" rx="6" ry="16" fill="#00e5bf" opacity="0.8" transform="rotate(292.5)"/>
    <!-- 315° --> <ellipse cx="0" cy="-62" rx="6" ry="16" fill="#4f6ef7" opacity="0.9" transform="rotate(315)"/>
    <!-- 337.5° --> <ellipse cx="0" cy="-62" rx="6" ry="16" fill="#00e5bf" opacity="0.8" transform="rotate(337.5)"/>

    <!-- Inner ring: circuit nodes at each leaf base -->
    <circle cx="0" cy="-44" r="2.5" fill="#00e5bf" opacity="0.5" transform="rotate(0)"/>
    <circle cx="0" cy="-44" r="2.5" fill="#4f6ef7" opacity="0.5" transform="rotate(45)"/>
    <circle cx="0" cy="-44" r="2.5" fill="#00e5bf" opacity="0.5" transform="rotate(90)"/>
    <circle cx="0" cy="-44" r="2.5" fill="#4f6ef7" opacity="0.5" transform="rotate(135)"/>
    <circle cx="0" cy="-44" r="2.5" fill="#00e5bf" opacity="0.5" transform="rotate(180)"/>
    <circle cx="0" cy="-44" r="2.5" fill="#4f6ef7" opacity="0.5" transform="rotate(225)"/>
    <circle cx="0" cy="-44" r="2.5" fill="#00e5bf" opacity="0.5" transform="rotate(270)"/>
    <circle cx="0" cy="-44" r="2.5" fill="#4f6ef7" opacity="0.5" transform="rotate(315)"/>

    <!-- Center ring — clean inner border -->
    <circle cx="0" cy="0" r="36" fill="#080e25" stroke="url(#tg)" stroke-width="1.5"/>

    <!-- Center initials RA -->
    <text x="0" y="-8" font-family="'Arial Black','Arial',sans-serif" font-size="22"
      font-weight="900" fill="url(#tg)" text-anchor="middle" letter-spacing="2">RA</text>
    <text x="0" y="12" font-family="'Arial',sans-serif" font-size="7"
      fill="#4f6ef7" text-anchor="middle" letter-spacing="3" opacity="0.7">ROMA·AI</text>
  </g>

  <!-- ROMA gradient text -->
  <text x="200" y="258" font-family="'Arial Black','Arial',sans-serif" font-size="48"
    font-weight="900" fill="url(#tg)" text-anchor="middle" letter-spacing="4">ROMA</text>

  <line x1="118" y1="270" x2="282" y2="270" stroke="url(#tg)" stroke-width="0.5" opacity="0.35"/>

  <text x="200" y="295" font-family="'Arial',sans-serif" font-size="13"
    font-weight="300" fill="#00e5bf" text-anchor="middle" letter-spacing="16">AI</text>

  <text x="200" y="325" font-family="'Arial',sans-serif" font-size="8"
    fill="#4f6ef7" text-anchor="middle" letter-spacing="4" opacity="0.55">INTELLIGENT AUTOMATION</text>
</svg>
