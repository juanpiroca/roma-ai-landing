<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f6ef7"/>
      <stop offset="100%" stop-color="#00e5bf"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glows">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="#050816"/>

  <!-- COLOSSEUM AS SIGNAL ICON -->
  <!-- The concept: 3 concentric arches from the same base = colosseum silhouette = signal/wifi -->

  <!-- Base ground line -->
  <line x1="130" y1="195" x2="270" y2="195" stroke="url(#tg)" stroke-width="3" stroke-linecap="round"/>

  <!-- Arch 1 — outer (full colosseum outer wall) -->
  <path d="M130,195 Q130,88 200,88 Q270,88 270,195"
    fill="none" stroke="url(#tg)" stroke-width="2.5" opacity="0.4"/>

  <!-- Arch 2 — middle -->
  <path d="M152,195 Q152,108 200,108 Q248,108 248,195"
    fill="none" stroke="url(#tg)" stroke-width="2.5" opacity="0.65"/>

  <!-- Arch 3 — inner (main opening) -->
  <path d="M174,195 Q174,128 200,128 Q226,128 226,195"
    fill="none" stroke="url(#tg)" stroke-width="3" opacity="1"/>

  <!-- Column marks on base — like Colosseum arched openings -->
  <g stroke="url(#tg)" stroke-width="1.2" opacity="0.35">
    <line x1="142" y1="195" x2="142" y2="168"/>
    <line x1="163" y1="195" x2="163" y2="160"/>
    <line x1="237" y1="195" x2="237" y2="160"/>
    <line x1="258" y1="195" x2="258" y2="168"/>
  </g>

  <!-- Signal dot at top — the broadcast point -->
  <circle cx="200" cy="88" r="7" fill="#00e5bf" opacity="0.9" filter="url(#glow)"/>
  <circle cx="200" cy="88" r="12" fill="none" stroke="#00e5bf" stroke-width="1" opacity="0.3" filter="url(#glows)"/>

  <!-- ROMA gradient text -->
  <text x="200" y="260" font-family="'Arial Black','Arial',sans-serif" font-size="48"
    font-weight="900" fill="url(#tg)" text-anchor="middle" letter-spacing="4">ROMA</text>

  <line x1="118" y1="272" x2="282" y2="272" stroke="url(#tg)" stroke-width="0.5" opacity="0.35"/>

  <text x="200" y="297" font-family="'Arial',sans-serif" font-size="13"
    font-weight="300" fill="#00e5bf" text-anchor="middle" letter-spacing="16">AI</text>

  <text x="200" y="327" font-family="'Arial',sans-serif" font-size="8"
    fill="#4f6ef7" text-anchor="middle" letter-spacing="4" opacity="0.55">INTELLIGENT AUTOMATION</text>
</svg>
