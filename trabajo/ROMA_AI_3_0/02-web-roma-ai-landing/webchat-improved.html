<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat con Roma AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .chat-container {
      width: 100%;
      max-width: 500px;
      background: #1a1a2e;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      height: 600px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .chat-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header h1 {
      color: #00d4ff;
      font-size: 20px;
      font-weight: 600;
    }

    .user-info {
      font-size: 12px;
      color: #888;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      display: flex;
      gap: 10px;
      animation: slideIn 0.3s ease-out;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
    }

    .message.bot .message-bubble {
      background: rgba(0, 212, 255, 0.1);
      color: #e0e0e0;
      border: 1px solid rgba(0, 212, 255, 0.3);
    }

    .message.user .message-bubble {
      background: #00d4ff;
      color: #000;
      border-radius: 12px 4px 12px 12px;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chat-input-area {
      padding: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: #e0e0e0;
      font-size: 14px;
    }

    input::placeholder {
      color: #666;
    }

    input:focus {
      outline: none;
      border-color: #00d4ff;
      background: rgba(0, 212, 255, 0.05);
    }

    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .lead-form {
      display: none;
      padding: 15px;
      background: rgba(0, 212, 255, 0.05);
      border-radius: 8px;
      border: 1px solid rgba(0, 212, 255, 0.2);
      margin-bottom: 10px;
    }

    .lead-form.active {
      display: block;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }

    .form-group label {
      font-size: 12px;
      color: #00d4ff;
      font-weight: 600;
    }

    .form-group input {
      margin: 0;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: rgba(0, 212, 255, 0.1);
      border-radius: 12px;
      width: fit-content;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00d4ff;
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% {
        opacity: 0.3;
        transform: translateY(0);
      }
      30% {
        opacity: 1;
        transform: translateY(-10px);
      }
    }

    .error-message {
      padding: 12px;
      background: rgba(255, 67, 67, 0.1);
      border: 1px solid rgba(255, 67, 67, 0.3);
      border-radius: 8px;
      color: #ff4343;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>🤖 Roma AI</h1>
      <div class="user-info" id="user-info">Anónimo</div>
    </div>

    <div class="chat-messages" id="messages">
      <div class="message bot">
        <div class="message-bubble">
          Hola! 👋 Soy Roma, tu asistente de marketing digital. ¿En qué área necesitas ayuda? (redes, ventas, web, publicidad)
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="input-group" id="message-input-area">
        <input type="text" id="message-input" placeholder="Escribe tu mensaje..." autocomplete="off">
        <button onclick="sendMessage()">Enviar</button>
      </div>

      <div id="whatsapp-cta" style="display: none; margin-top: 10px;">
        <button onclick="openWhatsApp()" style="width: 100%; background: linear-gradient(135deg, #25d366, #128c7e);">
          📱 Continuar en WhatsApp
        </button>
        <p style="font-size: 11px; color: #888; margin-top: 8px; text-align: center;">
          Ya tenemos tu número. Continúa aquí para mayor privacidad y datos.
        </p>
      </div>
    </div>
  </div>

  <script>
    let sessionId = generateSessionId();
    let messageCount = 0;
    const WHATSAPP_NUMBER = '1234567890'; // Cambiar por el número real

    function generateSessionId() {
      return 'web-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now();
    }

    function addMessage(text, sender = 'user') {
      const messagesDiv = document.getElementById('messages');
      const messageEl = document.createElement('div');
      messageEl.className = `message ${sender}`;

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.textContent = text;

      messageEl.appendChild(bubble);
      messagesDiv.appendChild(messageEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      // Mostrar CTA de WhatsApp después de 3 mensajes del bot
      if (sender === 'bot') {
        messageCount++;
        if (messageCount === 3) {
          setTimeout(showWhatsAppCTA, 1000);
        }
      }
    }

    function addTypingIndicator() {
      const messagesDiv = document.getElementById('messages');
      const messageEl = document.createElement('div');
      messageEl.className = 'message bot';
      messageEl.id = 'typing-indicator';

      const typing = document.createElement('div');
      typing.className = 'typing-indicator';
      typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

      messageEl.appendChild(typing);
      messagesDiv.appendChild(messageEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function removeTypingIndicator() {
      const indicator = document.getElementById('typing-indicator');
      if (indicator) indicator.remove();
    }

    function showWhatsAppCTA() {
      document.getElementById('whatsapp-cta').style.display = 'block';
      document.getElementById('message-input-area').style.display = 'none';
    }

    function openWhatsApp() {
      const message = encodeURIComponent('Hola! Quiero continuar mi consulta con Roma AI');
      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${message}`, '_blank');
    }

    async function sendMessage() {
      const input = document.getElementById('message-input');
      const text = input.value.trim();

      if (!text) return;

      // Agregar mensaje del usuario
      addMessage(text, 'user');
      input.value = '';

      // Mostrar indicador de escritura
      addTypingIndicator();

      try {
        // Enviar al backend
        const response = await fetch('/api/webchat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            sessionId,
            message: text,
          }),
        });

        const data = await response.json();
        removeTypingIndicator();

        if (data.reply) {
          addMessage(data.reply, 'bot');
        } else {
          addMessage('Entiendo. Para ayudarte mejor con todos los detalles, continúa en WhatsApp.', 'bot');
        }
      } catch (error) {
        removeTypingIndicator();
        addMessage('Para mejor atención, continúa nuestra conversación en WhatsApp.', 'bot');
        console.error('Error:', error);
      }
    }

    // Enter para enviar mensaje
    document.addEventListener('DOMContentLoaded', () => {
      const messageInput = document.getElementById('message-input');
      if (messageInput) {
        messageInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
          }
        });
      }
    });
  </script>
</body>
</html>
